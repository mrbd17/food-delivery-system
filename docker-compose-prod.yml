
services:
  db:
    image: postgres:15-alpine
    container_name: db
    env_file:
      - /home/mahmoud_rabia/deployments/secrets/.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]  # استخدم $$
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fooddelivery-network
    
    
  redis:
    image: redis:7-alpine
    container_name: redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fooddelivery-network
    
  web:
    image: ${APP_IMAGE}
    container_name: backend
    command: |
      sh -c "python manage.py collectstatic --noinput && \
        daphne -b 0.0.0.0 -p 8000 config.asgi:application "
    expose:
      - 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]  
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - /home/mahmoud_rabia/deployments/secrets/.env.docker
    volumes:
      - .:/app
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fooddelivery-network
    
    
  celery:
    image: ${APP_IMAGE}
    container_name: celery
    command: celery -A config worker -l info -P solo -Q emails 
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - /home/mahmoud_rabia/deployments/secrets/.env.docker
    depends_on:
      redis:
        condition: service_healthy  
      db:
        condition: service_healthy  
    networks:
      - fooddelivery-network

  celery-beat:
    image: ${APP_IMAGE}
    container_name: celery-beat
    command: celery -A config beat -l info  
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - /home/mahmoud_rabia/deployments/secrets/.env.docker
    depends_on:
      redis:
        condition: service_healthy 
      db:
        condition: service_healthy  
    networks:
      - fooddelivery-network

  nginx:
    image: nginx:1.30-alpine
    container_name: nginx
    env_file:
      - /home/mahmoud_rabia/deployments/secrets/.env.docker
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - ./templates/errors:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    
    depends_on:
      web:
        condition: service_healthy

    networks:
      - fooddelivery-network

volumes:
  postgres_data:
  media_files:

networks:
  fooddelivery-network:
    driver: bridge