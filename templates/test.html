<body>
    <script>
        const arr = [1, 2, 3, 4, 5, 6];
        
        function maxProduct(arr){
            const sortedArr = arr.sort((a,b) => a-b)
            return sortedArr[0] * sortedArr[1]
        }

        const result = maxProduct(arr);
        console.log(result)
        
    </script>
