{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Tracking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/trackingorder.css' %}" />
</head>
<body>

  <div class="page-wrapper">

    <header class="page-header">
      <button class="btn-back" id="btn-back" aria-label="Go back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </button>
      <h1 class="page-title">Order Tracking</h1>
    </header>

    <main class="content" id="content">

      <div class="skeleton-loader" id="skeleton" aria-live="polite" aria-label="Loading order details">
        <div class="skeleton-card">
          <div class="skeleton-line w-40"></div>
          <div class="skeleton-line w-24"></div>
          <div class="skeleton-block"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line w-32"></div>
          <div class="skeleton-step"></div>
          <div class="skeleton-step"></div>
          <div class="skeleton-step"></div>
          <div class="skeleton-step"></div>
        </div>
      </div>

      <section class="card card--header hidden" id="section-header" aria-label="Order header">
        <div class="order-meta">
          <div class="order-id-block">
            <span class="label">Order ID</span>
            <span class="order-number" id="order-number"></span>
          </div>
          <div class="status-badge-wrap">
            <span class="status-badge" id="status-badge"></span>
          </div>
        </div>
        <hr class="divider" />
        <div class="arrival-row">
          <svg class="icon-clock" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span class="arrival-label">Estimated arrival:</span>
          <span class="arrival-time" id="arrival-time"></span>
        </div>
        <div class="map-placeholder" aria-hidden="true">
          <div class="map-inner">
            <span class="map-text" id="map-text"></span>
          </div>
        </div>
      </section>

      <section class="card card--progress hidden" id="section-progress" aria-label="Delivery progress">
        <h2 class="section-label">DELIVERY PROGRESS</h2>
        <ol class="timeline" id="timeline" role="list"></ol>
      </section>

      <section class="card card--items hidden" id="section-items" aria-label="Items in this order">
        <h2 class="section-label">ITEMS IN THIS ORDER</h2>
        <ul class="items-list" id="items-list" role="list"></ul>
        <div class="summary-block">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="summary-subtotal"></span>
          </div>
          <div class="summary-row">
            <span>Delivery fee</span>
            <span id="summary-delivery"></span>
          </div>
          <hr class="divider" />
          <div class="summary-row summary-row--total">
            <span>Total paid</span>
            <span id="summary-total"></span>
          </div>
        </div>
      </section>

    </main>

    <footer class="action-bar hidden" id="action-bar">
      <button class="btn btn--cancel" id="btn-cancel">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Cancel order
      </button>
      <button class="btn btn--support" id="btn-support">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M8 10v.5M8 6a1.5 1.5 0 010 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Contact support
      </button>
    </footer>

    <div class="toast hidden" id="toast" role="alert" aria-live="assertive"></div>

  </div>

  <script type="module" src="{% static 'js/orders/orderTracking.js' %}"></script>
</body>
</html>
