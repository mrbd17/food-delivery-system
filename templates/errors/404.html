<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b35;
            --secondary: #004e89;
            --light: #f7f7f7;
            --dark: #1a1a1a;
            --border: #e0e0e0;
            --success: #06d6a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .status-code {
            font-size: 72px;
            font-weight: 900;
            color: var(--primary);
            margin: 20px 0;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #ff8c42);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--secondary);
            border: 2px solid var(--secondary);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: white;
            transform: translateY(-2px);
        }

        .illustration {
            margin: 20px 0;
            font-size: 60px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 30px 0;
        }

        .suggestions {
            text-align: right;
            color: #999;
            font-size: 13px;
        }

        .suggestions h3 {
            color: var(--dark);
            font-size: 14px;
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .suggestions ul {
            list-style: none;
            text-align: right;
        }

        .suggestions li {
            padding: 4px 0;
            color: #666;
        }

        .suggestions a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .suggestions a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .status-code {
                font-size: 56px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 14px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="illustration">🍔</div>
        
        <div class="status-code">404</div>
        
        <h1>عذراً! الصفحة غير موجودة</h1>
        <p>يبدو أنك حاولت الوصول لصفحة لا تتواجد على خادمنا. قد تكون الرابط خاطئ أو تم حذف الصفحة.</p>

        <div class="action-buttons">
            <a href="/" class="btn btn-primary">العودة للرئيسية</a>
            <a href="javascript:history.back()" class="btn btn-secondary">العودة للصفحة السابقة</a>
        </div>

        <div class="divider"></div>

        <div class="suggestions">
            <h3>ربما تبحث عن:</h3>
            <ul>
                <li><a href="/restaurants">المطاعم</a></li>
                <li><a href="/orders">طلباتي</a></li>
                <li><a href="/cart">سلة التسوق</a></li>
                <li><a href="/profile">ملفي الشخصي</a></li>
            </ul>
        </div>

        <div class="footer-text">
            إذا استمرت المشكلة، <a href="mailto:support@fooddelivery.com" style="color: var(--primary);">تواصل معنا</a>
        </div>
    </div>
</body>
</html>
