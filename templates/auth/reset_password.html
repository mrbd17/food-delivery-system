<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FoodDelivery</title>
    <link rel="stylesheet" href="/static/css/auth/reset_password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2>Set New Password</h2>
        <p>Create a strong password for your account</p>

        <form id="reset-form">
            
            <div class="input-group">
                <label for="password">New Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter new password"
                        required
                        minlength="8"
                    >
                    <i class="fa-regular fa-eye toggle-visibility" data-target="password"></i>
                </div>

                <div class="strength">
                    <div class="strength-bar">
                        <span id="strength-fill"></span>
                    </div>
                    <span class="strength-text" id="strength-text">Weak</span>
                </div>

                <ul class="password-rules" id="password-rules">
                    <li id="rule-length" class="rule">✗ At least 8 characters</li>
                    <li id="rule-number" class="rule">✗ Contains a number</li>
                    <li id="rule-upper" class="rule">✗ Contains uppercase letter</li>
                    <li id="rule-special" class="rule">✗ Contains special character</li>
                </ul>
            </div>

            <div class="input-group">
                <label for="confirm">Confirm Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="confirm" 
                        name="confirm" 
                        placeholder="Confirm password"
                        required
                    >
                    <i class="fa-regular fa-eye toggle-visibility" data-target="confirm"></i>
                </div>
                <span id="password-match" class="password-match"></span>
            </div>

            <button type="submit" class="primary-btn" id="submit-btn" disabled>
                Reset Password
            </button>
        </form>

        <a href="/auth?mode=login" class="back-link">Back to Login</a>
    </div>
</div>

<script type="module" src="/static/js/auth/pages/reset-password.js"></script>

</body>
</html>
