<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FoodDelivery</title>
    <link rel="stylesheet" href="/static/css/auth/forgot_password.css">
</head>
<body>

<div class="reset-card">
    <h2>Reset Your Password</h2>
    <p>Enter your email address to receive a verification code</p>

    <form id="forgot-password-form">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="Enter your email"
                required
            >
        </div>

        <button type="submit" class="btn btn-primary" id="send-btn">
            Send Verification Code
        </button>
    </form>

    <div class="divider">OR</div>

    <a href="/auth?mode=login" class="btn btn-secondary">
        Back to Login
    </a>
</div>

<script type="module" src="/static/js/auth/pages/forgot-password.js"></script>

</body>
</html>
