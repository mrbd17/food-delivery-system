<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - FoodDeliverySystem</title>
    <link rel="stylesheet" href="/static/css/auth/auth.css">
    <link rel="stylesheet" href="/static/css/components/toast.css">
</head>

<body>
    <div class="container" id="container">
        <!-- SIGN UP FORM -->
        <div class="form-container sign-up-container">
            <form id="registerForm">
                <h1>Create Account</h1>
                <input name="first_name" type="text" placeholder="First Name" required>
                <input name="last_name" type="text" placeholder="Last Name" required>
                <input name="email" type="email" placeholder="Email" required>

                <div class="password-wrapper">
                    <input id="registerPassword" name="password1" type="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" data-target="registerPassword">
                        <svg class="eye-icon eye-on" viewBox="0 0 24 24">
                            <path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12z"/>
                            <circle cx="12" cy="12" r="3.5"/>
                        </svg>
                        <svg class="eye-icon eye-off" viewBox="0 0 24 24">
                            <path d="M3 3l18 18"/>
                            <path d="M1.5 12s4-7.5 10.5-7.5c2.3 0 4.3.7 6 1.7"/>
                            <path d="M22.5 12s-4 7.5-10.5 7.5c-2.3 0-4.3-.7-6-1.7"/>
                        </svg>
                    </button>
                </div>

                <div class="password-wrapper">
                    <input id="registerPasswordConfirm" name="password2" type="password" placeholder="Confirm Password" required>
                    <button type="button" class="toggle-password" data-target="registerPasswordConfirm">
                        <svg class="eye-icon eye-on" viewBox="0 0 24 24">
                            <path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12z"/>
                            <circle cx="12" cy="12" r="3.5"/>
                        </svg>
                        <svg class="eye-icon eye-off" viewBox="0 0 24 24">
                            <path d="M3 3l18 18"/>
                            <path d="M1.5 12s4-7.5 10.5-7.5c2.3 0 4.3.7 6 1.7"/>
                            <path d="M22.5 12s-4 7.5-10.5 7.5c-2.3 0-4.3-.7-6-1.7"/>
                        </svg>
                    </button>
                </div>

                <button type="submit">Sign Up</button>
            </form>

            <button id="googleSignUp" class="google-btn">
                Sign up with google
            </button>
        </div> 
        
        <!-- LOGIN FORM -->
        <div class="form-container login-container">
            <form id="loginForm">
                <h1>Sign In</h1>
                <input name="email" type="email" placeholder="Email" required>

                <div class="password-wrapper">
                    <input id="loginPassword" name="password" type="password" placeholder="Password" required> 
                    <button type="button" class="toggle-password" data-target="loginPassword">
                        <svg class="eye-icon eye-on" viewBox="0 0 24 24">
                            <path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12z"/>
                            <circle cx="12" cy="12" r="3.5"/>
                        </svg>

                        <svg class="eye-icon eye-off" viewBox="0 0 24 24">
                            <path d="M3 3l18 18"/>
                            <path d="M1.5 12s4-7.5 10.5-7.5c2.3 0 4.3.7 6 1.7"/>
                            <path d="M22.5 12s-4 7.5-10.5 7.5c-2.3 0-4.3-.7-6-1.7"/>
                        </svg>
                    </button>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- OVERLAY PANELS -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back</h1>
                    <p>Already have an account</p>
                    <button id="signIn" class="ghost-btn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello Friend</h1>
                    <p>Create your account now</p>
                    <button id="signUp" class="ghost-btn">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="/static/js/auth/auth.controller.js"></script>
    <script type="module" src='/static/js/vendor/axios.min.js'></script>
    <script type="module" src='/static/js/app/app.js'></script>
</body>
</html>
