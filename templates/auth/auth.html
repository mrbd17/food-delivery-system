<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta name="referrer" content="no-referrer-when-downgrade"> -->
    <title>Auth - FoodDeliverySystem</title>
    <link rel="stylesheet" href="/static/css/auth/auth.css">
    <link rel="stylesheet" href="/static/css/components/toast.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body data-google-client-id="791479555332-irn5feboqp2s2u6gnvjk3kmoqq2lsatd.apps.googleusercontent.com">
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="registerForm">
                <h1>Create Account</h1>
                <input name="first_name" type="text" placeholder="First Name" required>
                <input name="last_name" type="text" placeholder="Last Name" required>
                <input name="email" type="email" placeholder="Email" required>

                <div class="password-wrapper">
                    <input id="registerPassword" name="password1" type="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" data-target="registerPassword">
                        <svg class="eye-icon eye-on" viewBox="0 0 24 24">
                            <path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12z"/>
                            <circle cx="12" cy="12" r="3.5"/>
                        </svg>
                        <svg class="eye-icon eye-off" viewBox="0 0 24 24">
                            <path d="M3 3l18 18"/>
                            <path d="M1.5 12s4-7.5 10.5-7.5c2.3 0 4.3.7 6 1.7"/>
                            <path d="M22.5 12s-4 7.5-10.5 7.5c-2.3 0-4.3-.7-6-1.7"/>
                        </svg>
                    </button>
                </div>

                <div class="password-wrapper">
                    <input id="registerPasswordConfirm" name="password2" type="password" placeholder="Confirm Password" required>
                    <button type="button" class="toggle-password" data-target="registerPasswordConfirm">
                        <svg class="eye-icon eye-on" viewBox="0 0 24 24">
                            <path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12z"/>
                            <circle cx="12" cy="12" r="3.5"/>
                        </svg>
                        <svg class="eye-icon eye-off" viewBox="0 0 24 24">
                            <path d="M3 3l18 18"/>
                            <path d="M1.5 12s4-7.5 10.5-7.5c2.3 0 4.3.7 6 1.7"/>
                            <path d="M22.5 12s-4 7.5-10.5 7.5c-2.3 0-4.3-.7-6-1.7"/>
                        </svg>
                    </button>
                </div>

                <button type="submit">Sign Up</button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div id="google-button-signup"></div>

            <div class="social-buttons">
                <button type="button" class="social-btn github-btn" data-provider="github" title="GitHub sign up coming soon" disabled>
                    <svg viewBox="0 0 24 24" class="social-icon">
                        <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 9.405c2.295-1.545 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.01 12.01 0 0024 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    <span>GitHub</span>
                </button>

                <button type="button" class="social-btn facebook-btn" data-provider="facebook" title="Facebook sign up coming soon" disabled>
                    <svg viewBox="0 0 24 24" class="social-icon">
                        <path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    <span>Facebook</span>
                </button>
            </div>
        </div> 
        
        <div class="form-container login-container">
            <form id="loginForm">
                <h1>Sign In</h1>
                <input name="email" type="email" placeholder="Email" required>

                <div class="password-wrapper">
                    <input id="loginPassword" name="password" type="password" placeholder="Password" required> 
                    <button type="button" class="toggle-password" data-target="loginPassword">
                        <svg class="eye-icon eye-on" viewBox="0 0 24 24">
                            <path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12z"/>
                            <circle cx="12" cy="12" r="3.5"/>
                        </svg>

                        <svg class="eye-icon eye-off" viewBox="0 0 24 24">
                            <path d="M3 3l18 18"/>
                            <path d="M1.5 12s4-7.5 10.5-7.5c2.3 0 4.3.7 6 1.7"/>
                            <path d="M22.5 12s-4 7.5-10.5 7.5c-2.3 0-4.3-.7-6-1.7"/>
                        </svg>
                    </button>
                </div>
                <button type="submit">Login</button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div id="google-button-signin"></div>

            <div class="social-buttons">
                <button type="button" class="social-btn github-btn" data-provider="github" title="GitHub sign in coming soon" disabled>
                    <svg viewBox="0 0 24 24" class="social-icon">
                        <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 9.405c2.295-1.545 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.01 12.01 0 0024 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    <span>GitHub</span>
                </button>

                <button type="button" class="social-btn facebook-btn" data-provider="facebook" title="Facebook sign in coming soon" disabled>
                    <svg viewBox="0 0 24 24" class="social-icon">
                        <path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    <span>Facebook</span>
                </button>
            </div>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back</h1>
                    <p>Already have an account</p>
                    <button id="signIn" class="ghost-btn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello Friend</h1>
                    <p>Create your account now</p>
                    <button id="signUp" class="ghost-btn">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="/static/js/auth/auth.controller.js"></script>
    <script type="module" src="/static/js/vendor/axios.min.js"></script>
    <script type="module" src="/static/js/app/app.js"></script>
</body>
</html>
