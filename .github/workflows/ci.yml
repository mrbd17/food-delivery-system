name: Ci Pipline

on:
    push: 
        branches:
            - main
    pull_request: 
        branches:
            - main

env:
  REGISTRY: grcr.io
  IMAGE_NAME: ${{github.repository}}

jobs:

  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
