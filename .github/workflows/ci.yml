name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  
  # LINTING - Code quality checks
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/dev.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Formatter Check
        run: ruff format .

  # TESTING - Unit tests with PostgreSQL and Redis

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: food_delivery_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/dev.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run Database Migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DEBUG: "False"
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/food_delivery_test
          SECRET_KEY: test-secret-key-only-for-ci
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate

      - name: Run Tests with Coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DEBUG: "False"
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/food_delivery_test
          SECRET_KEY: test-secret-key-only-for-ci
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=fooddelivery --cov-report=xml --cov-report=term-missing -v

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # SECURITY - Bandit, pip-audit, and secrets detection



  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/dev.txt

      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install bandit safety pip-audit

      - name: Run Bandit Security Scanner
        run: |
          bandit -r fooddelivery/ -f json -o bandit-report.json || true
          bandit -r fooddelivery/ -f txt

      - name: Check for Known Vulnerabilities
        run: pip-audit --skip-editable || true

      - name: Detect Secrets in Repository
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          

  # BUILD - Docker image creation (only on main branch)

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, security]

    permissions:
      contents: read
      packages: write

    if: github.event_name == 'push' 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log In to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{github.sha}}
            type=semver,pattern={{version}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Print Tags
        run: |
          echo "${{steps.meta.outputs.tags}}"
  # SCAN - Container image vulnerability scanning

  scan:
    name: Scan Docker Image
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: read
      security-events: write

    if: github.event_name == 'push'
    steps:
      - name: Log In to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy via APT
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Image with Trivy
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

