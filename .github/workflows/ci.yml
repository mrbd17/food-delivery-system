name: Ci Pipline

on:
    push: 
        branches:
            - main
    pull_request: 
        branches:
            - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{github.repository}}

jobs:

# linting

  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements/dev.txt
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run Ruff
        run :  ruff format --check .
      
      - name: Check Formater (with Ruff)
        run : ruff format --check .
      
# test 

    test:
      name: Test code
      runs-on: ubuntu-latest

      services:
        #DB
        postgres:
          image: postgres:15-alpine
          env:
            POSTGRES_DB: food_delivery_test
            POSTGRES_USER: test_user
            POSTGRES_PASSWORD: test_password
          options: >- 
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5

          ports: 
            - 5432:5432
        # Redis
        redis:
          image: redis:7-alpine
          options: >- 
            --health-cmd "redis-cli ping"
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
          ports:
            - 6379:6379
      
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Set Up Python
          uses: actions/setup-python@v5
          with: 
            python-version: '3.11'
            cache: 'pip'
            cache-dependency-path: requirements/dev.txt
          
        - name: Install Dependencies
          run: |
            python -m pip install upgrade pip
            pip install requirements/dev.txt
          
        - nema: Run Migrations
          env:
            DEBUG: False 
            DATABASE_URL: postgresql://test_user:test_password@localhost:5432/food_delivery_test
            SECRET_KEY: test-secret-key
            REDIS_oRL: redis://localhost:6379/0
          run: python manage.py migrate

        - name: Run Unit Tests with Converage
          env: 
            DEBUG: False
            DATABASE_URL: postgresql://test_user:test_password@localhost:5432/food_delivery_test
            SECRET_KEY: test-secret-key
            REDIS_URL: redis://localhost:6379/0
          run: |
            pytest --cov=. --cov-report=xml --cov-report=term-missing -v

        - name: Upload Coverage Reports
          if: always()
          uses: codecov/codecov-action@v5
          with:
            files: ./coverage.xml
            flags: unittests
            fail_ci_if_error: false
          


